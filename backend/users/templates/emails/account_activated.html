{% extends "emails/base_email.html" %}
{% block title %}Dein Konto wurde aktiviert{% endblock %}
{% block content %}
<p style="margin:0 0 16px; color:#ffffff; font-size:18px; font-weight:700;">Willkommen, {{ username }}!</p>
<p style="margin:0 0 20px;">Dein Konto bei Punishers Germany wurde soeben von einem Administrator freigeschaltet. Du kannst dich ab sofort anmelden.</p>
<table role="presentation" cellpadding="0" cellspacing="0">
  <tr>
    <td style="border-radius:6px; background-color:#dc2626;">
      <a href="{{ login_url }}" style="display:inline-block; padding:12px 28px; color:#ffffff; font-weight:600; text-decoration:none; font-size:14px;">Jetzt anmelden</a>
    </td>
  </tr>
</table>
{% endblock %}
