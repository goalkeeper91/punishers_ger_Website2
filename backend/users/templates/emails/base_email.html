{% load static %}<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Punishers Germany{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#111827; font-family:'Segoe UI', Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#111827; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px; background-color:#1f2937; border-radius:8px; overflow:hidden;">
          <tr>
            <td style="background-color:#111827; border-bottom:3px solid #dc2626; padding:20px 32px;">
              <span style="font-size:18px; font-weight:700; color:#ffffff; letter-spacing:0.5px;">PUNISHERS GERMANY</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px; color:#e5e7eb; font-size:15px; line-height:1.6;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 24px; color:#6b7280; font-size:12px; line-height:1.5; border-top:1px solid #374151;">
              {% block footer %}Diese E-Mail wurde automatisch von Punishers Germany verschickt. Falls du diese Nachricht nicht erwartet hast, kannst du sie ignorieren.{% endblock %}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
